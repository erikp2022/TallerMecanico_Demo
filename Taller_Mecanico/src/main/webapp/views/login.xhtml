<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">
<f:view contentType="text/html" encoding="UTF-8">
    <f:metadata>
        <f:viewAction action="#{loginBean.comprobarYaLogueado}"/>
    </f:metadata>
    <h:head>
        <title>Iniciar sesión — Taller Mecánico</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
        <h:outputStylesheet library="css" name="estilos.css"/>
    </h:head>
    <h:body styleClass="login-page min-vh-100 d-flex flex-column">
        <div class="flex-grow-1 d-flex align-items-center justify-content-center px-3 py-5">
            <div class="w-100" style="max-width: 440px;">
                <div class="text-center mb-4">
                    <span class="d-inline-flex align-items-center justify-content-center rounded-4 bg-primary bg-opacity-10 text-primary p-3 mb-3 shadow-sm">
                        <i class="bi bi-wrench-adjustable fs-1"></i>
                    </span>
                    <h1 class="h3 fw-bold text-dark mb-1">Taller Mecánico</h1>
                    <p class="text-muted small mb-0">Sistema de órdenes de trabajo</p>
                </div>

                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="h5 fw-semibold mb-4 text-center">Iniciar sesión</h2>
                        <h:form id="formLogin">
                            <p:growl id="msgs" showDetail="true" life="5000" styleClass="shadow-sm"/>

                            <div class="mb-3">
                                <label for="correo" class="form-label small text-muted">Correo electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                                    <p:inputText id="correo" value="#{loginBean.correo}" required="true"
                                                 requiredMessage="Ingrese el correo" placeholder="nombre@gmail..com"
                                                 pt:type="email" pt:autocomplete="username"
                                                 styleClass="form-control border-start-0 ps-0 rounded-end">
                                        <f:validateRegex pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$"/>
                                    </p:inputText>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="clave" class="form-label small text-muted">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                                    <p:password id="clave" value="#{loginBean.contrasena}" required="true"
                                                requiredMessage="Ingrese la contraseña" feedback="false"
                                                styleClass="form-control border-start-0 ps-0 rounded-end"/>
                                </div>
                            </div>
                            <p:commandButton id="btnLogin" value="Entrar al sistema" icon="pi pi-sign-in"
                                             action="#{loginBean.iniciarSesion}"
                                             styleClass="btn btn-primary btn-lg w-100 rounded-3 fw-semibold shadow-sm"
                                             update="msgs"/>
                        </h:form>
                    </div>
                    <div class="card-footer bg-light border-0 py-3 text-center small text-muted">
                        Roles: administrador (gestión total) o técnico (sus órdenes asignadas)
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
                crossorigin="anonymous"/>
    </h:body>
</f:view>
</html>
