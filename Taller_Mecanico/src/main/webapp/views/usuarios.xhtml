<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/template.xhtml">

    <ui:define name="title">Usuarios</ui:define>

    <ui:define name="content">
        <f:metadata>
            <f:viewAction action="#{loginBean.exigirAdmin}"/>
        </f:metadata>

        <h:panelGroup rendered="#{loginBean.admin}">

            <!-- Barra superior -->
            <h:form id="formBarUsu" prependId="false">
                <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                    <div>
                        <h2 class="h3 fw-bold text-primary mb-1">Usuarios</h2>
                        <p class="text-muted small mb-0">Vista, edición y eliminación de usuarios</p>
                    </div>
                    <p:commandButton value="Nuevo usuario" icon="pi pi-plus"
                                     actionListener="#{usuarioBean.prepararNuevo}"
                                     update=":formDlgNuevo"
                                     oncomplete="PF('dlgNuevoUsuario').show()"
                                     styleClass="btn btn-primary rounded-3 shadow-sm"/>
                </div>
            </h:form>

            <!-- Tabla -->
            <h:form id="formTabla">
                <div class="card border-0 shadow-sm">
                    <div class="table-responsive rounded-3">
                        <p:dataTable value="#{usuarioBean.lista}" var="u"
                                     paginator="true" rows="10" reflow="true"
                                     emptyMessage="Sin registros"
                                     tableStyleClass="table table-hover align-middle mb-0">

                            <p:column headerText="ID" width="70">
                                <h:outputText value="#{u.idUsuario}"/>
                            </p:column>
                            <p:column headerText="Nombre">
                                <h:outputText value="#{u.nombre}"/>
                            </p:column>
                            <p:column headerText="Correo">
                                <h:outputText value="#{u.correo}"/>
                            </p:column>
                            <p:column headerText="Rol">
                                <span class="badge bg-secondary">#{u.rol}</span>
                            </p:column>
                            <p:column headerText="Estado">
                                <span class="badge #{u.estado eq 'Activo' ? 'bg-success' : 'bg-secondary'}">#{u.estado}</span>
                            </p:column>

                            <p:column headerText="Acciones" width="120">
                                <div class="d-flex gap-2">
                                    <!-- Editar: siempre visible -->
                                    <p:commandButton icon="pi pi-pencil"
                                                     actionListener="#{usuarioBean.prepararEditar(u)}"
                                                     update=":formDlgEdit"
                                                     oncomplete="PF('dlgEditUsuario').show()"
                                                     styleClass="btn btn-sm btn-outline-primary"
                                                     title="Editar"/>

                                    <!-- Eliminar: solo si el usuario es admin -->
                                    <p:commandButton icon="pi pi-trash"
                                                     action="#{usuarioBean.eliminar(u)}"
                                                     update=":formTabla :growl"
                                                     styleClass="btn btn-sm btn-outline-danger"
                                                     title="Eliminar"
                                                     rendered="#{u.rol eq 'admin'}">
                                        <p:confirm header="Confirmar eliminación"
                                                   message="¿Seguro que desea eliminar este usuario administrador?"
                                                   icon="pi pi-exclamation-triangle"/>
                                    </p:commandButton>
                                </div>
                            </p:column>

                        </p:dataTable>
                    </div>
                </div>
            </h:form>

            <!-- ConfirmDialog global -->
            <h:form id="formConfirmUsu">
                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade"
                                 responsive="true" width="350" styleClass="rounded-3 shadow">
                    <p:commandButton value="Cancelar"
                                     icon="pi pi-times"
                                     styleClass="btn btn-outline-secondary ui-confirmdialog-no"
                                     type="button"/>
                    <p:commandButton value="Eliminar"
                                     icon="pi pi-check"
                                     styleClass="btn btn-danger ui-confirmdialog-yes"
                                     type="button"/>
                </p:confirmDialog>
            </h:form>

            <!-- Diálogo: Nuevo usuario -->
            <h:form id="formDlgNuevo">
                <p:dialog header="Nuevo Usuario Administrador" widgetVar="dlgNuevoUsuario"
                          modal="true" responsive="true">
                    <p:messages id="msgsNuevo" closable="true" showDetail="false"/>

                    <p:panelGrid columns="2" rendered="#{usuarioBean.nuevo != null}" styleClass="ui-fluid">
                        <p:outputLabel value="Nombre:" for="nomN"/>
                        <p:inputText id="nomN" value="#{usuarioBean.nuevo.nombre}" required="true"
                                     requiredMessage="Nombre requerido"/>

                        <p:outputLabel value="Correo:" for="corN"/>
                        <p:inputText id="corN" value="#{usuarioBean.nuevo.correo}" required="true"
                                     requiredMessage="Correo requerido">
                            <f:validateRegex pattern="^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$"/>
                            <p:ajax event="blur" update="msgsNuevo"/>
                        </p:inputText>

                        <p:outputLabel value="Contraseña:" for="passN"/>
                        <p:password id="passN" value="#{usuarioBean.nuevo.contrasena}" required="true"
                                    requiredMessage="Contraseña requerida"/>

                        <p:outputLabel value="Estado:"/>
                        <p:selectOneMenu value="#{usuarioBean.nuevo.estado}">
                            <f:selectItems value="#{usuarioBean.estadosRegistro}"/>
                        </p:selectOneMenu>
                    </p:panelGrid>

                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2">
                            <p:commandButton value="Cancelar" type="button"
                                             onclick="PF('dlgNuevoUsuario').hide()"
                                             styleClass="btn btn-secondary"/>
                            <p:commandButton value="Guardar"
                                             action="#{usuarioBean.guardar}"
                                             update="msgsNuevo :formTabla :growl"
                                             oncomplete="if(!args.validationFailed) PF('dlgNuevoUsuario').hide()"
                                             styleClass="btn btn-primary"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>

            <!-- Diálogo: Editar usuario -->
            <h:form id="formDlgEdit">
                <p:dialog header="Modificar Usuario" widgetVar="dlgEditUsuario"
                          modal="true" responsive="true">
                    <p:messages id="msgsEdit" closable="true" showDetail="false"/>

                    <p:panelGrid columns="2" rendered="#{usuarioBean.seleccionado != null}" styleClass="ui-fluid">
                        <p:outputLabel value="Nombre:" for="nomE"/>
                        <p:inputText id="nomE" value="#{usuarioBean.seleccionado.nombre}" required="true"
                                     requiredMessage="Nombre requerido"/>

                        <p:outputLabel value="Correo:" for="corE"/>
                        <p:inputText id="corE" value="#{usuarioBean.seleccionado.correo}" required="true"
                                     requiredMessage="Correo requerido">
                            <f:validateRegex pattern="^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$"/>
                            <p:ajax event="blur" update="msgsEdit"/>
                        </p:inputText>

                        <p:outputLabel value="Nueva Contraseña:" for="passE"/>
                        <p:password id="passE" value="#{usuarioBean.seleccionado.contrasena}"
                                    placeholder="Dejar vacío para mantener actual"/>

                        <p:outputLabel value="Estado:"/>
                        <p:selectOneMenu value="#{usuarioBean.seleccionado.estado}">
                            <f:selectItems value="#{usuarioBean.estadosRegistro}"/>
                        </p:selectOneMenu>
                    </p:panelGrid>

                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2">
                            <p:commandButton value="Cancelar" type="button"
                                             onclick="PF('dlgEditUsuario').hide()"
                                             styleClass="btn btn-secondary"/>
                            <p:commandButton value="Actualizar Datos"
                                             action="#{usuarioBean.actualizar}"
                                             update="msgsEdit :formTabla :growl"
                                             oncomplete="if(!args.validationFailed) PF('dlgEditUsuario').hide()"
                                             styleClass="btn btn-primary"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>

        </h:panelGroup>

        <!-- Sin permisos -->
        <h:panelGroup layout="block"
                      styleClass="alert alert-warning border-0 shadow-sm"
                      rendered="#{not loginBean.admin}">
            <i class="bi bi-shield-exclamation me-2"></i>No tiene permisos para administrar usuarios.
        </h:panelGroup>

    </ui:define>
</ui:composition>
