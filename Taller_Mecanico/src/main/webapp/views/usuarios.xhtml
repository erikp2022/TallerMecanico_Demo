<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/template.xhtml">

    <ui:define name="title">Usuarios</ui:define>

    <ui:define name="content">
        <f:metadata>
            <f:viewAction action="#{loginBean.exigirAdmin}"/>
        </f:metadata>

        <h:panelGroup rendered="#{loginBean.admin}">

            <!-- Barra superior -->
            <h:form id="formBarUsu" prependId="false">
                <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                    <div>
                        <h2 class="h3 fw-bold text-primary mb-1">Usuarios</h2>
                        <p class="text-muted small mb-0">Vista, edición y eliminación de usuarios</p>
                    </div>
                    <p:commandButton value="Nuevo usuario" icon="pi pi-plus"
                                     actionListener="#{usuarioBean.prepararNuevo}"
                                     update=":formDlgNuevo"
                                     oncomplete="PF('dlgNuevoUsuario').show()"
                                     styleClass="btn btn-primary rounded-3 shadow-sm"/>
                </div>
            </h:form>

            <!-- Tabla -->
            <h:form id="formTabla">
                <div class="card border-0 shadow-sm">
                    <div class="table-responsive rounded-3">
                        <p:dataTable value="#{usuarioBean.lista}" var="u"
                                     paginator="true" rows="10" reflow="true"
                                     emptyMessage="Sin registros"
                                     tableStyleClass="table table-hover align-middle mb-0">

                            <p:column headerText="ID" width="70">
                                <h:outputText value="#{u.idUsuario}"/>
                            </p:column>
                            <p:column headerText="Nombre">
                                <h:outputText value="#{u.nombre}"/>
                            </p:column>
                            <p:column headerText="Correo">
                                <h:outputText value="#{u.correo}"/>
                            </p:column>
                            <p:column headerText="Rol">
                                <span class="badge bg-secondary">#{u.rol}</span>
                            </p:column>
                            <p:column headerText="Estado">
                                <h:outputText value="#{u.estado}"/>
                            </p:column>
                            <p:column headerText="Acciones" width="200">
                                <div class="btn-group btn-group-sm">
                                    <p:commandButton icon="pi pi-pencil" title="Editar"
                                                     process="@this" update=":formDlgEdit"
                                                     actionListener="#{usuarioBean.prepararEditar(u)}"
                                                     oncomplete="PF('dlgEditUsuario').show()"
                                                     styleClass="btn btn-outline-primary"/>
                                    <p:commandButton icon="pi pi-trash" title="Eliminar"
                                                     process="@this"
                                                     action="#{usuarioBean.eliminar(u)}"
                                                     update=":formTabla :growl"
                                                     styleClass="btn btn-outline-danger">
                                        <p:confirm header="Confirmar eliminación"
                                                   message="¿Está seguro de eliminar este usuario?"
                                                   icon="pi pi-exclamation-triangle"/>
                                    </p:commandButton>
                                </div>
                            </p:column>

                        </p:dataTable>
                    </div>
                </div>
            </h:form>

            <!-- ConfirmDialog en su PROPIO form -->
            <h:form id="formConfirmUsu">
                <p:confirmDialog global="true" widgetVar="dlgConfirmUsu"
                                 styleClass="rounded-3 shadow">
                    <p:commandButton value="Cancelar"
                                     icon="pi pi-times"
                                     onclick="PF('dlgConfirmUsu').hide(); return false;"
                                     styleClass="btn btn-outline-secondary ui-confirmdialog-no"
                                     type="button"/>
                    <p:commandButton value="Aceptar"
                                     icon="pi pi-check"
                                     styleClass="btn btn-danger ui-confirmdialog-yes"
                                     type="button"/>
                </p:confirmDialog>
            </h:form>

            <!-- Dialog Nuevo Usuario -->
            <h:form id="formDlgNuevo">
                <p:dialog header="Nuevo usuario" widgetVar="dlgNuevoUsuario"
                          modal="true" resizable="false" draggable="false"
                          closable="true" closeOnEscape="true"
                          responsive="true" blockScroll="true"
                          styleClass="rounded-3 shadow taller-dialog-md">

                    <p class="small text-muted mb-3">
                        Las cuentas de técnico se crean automáticamente al registrar un técnico.
                    </p>

                    <p:panelGrid columns="2"
                                 rendered="#{usuarioBean.nuevo != null}"
                                 styleClass="ui-fluid taller-dialog-grid">
                        <p:outputLabel value="Nombre" styleClass="form-label"/>
                        <p:inputText value="#{usuarioBean.nuevo.nombre}"
                                     required="true" styleClass="form-control"/>

                        <p:outputLabel value="Correo" styleClass="form-label"/>
                        <p:inputText value="#{usuarioBean.nuevo.correo}"
                                     required="true" styleClass="form-control"
                                     placeholder="nombre@correo.com">
                            <f:validateRegex pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$"/>
                        </p:inputText>

                        <p:outputLabel value="Contraseña" styleClass="form-label"/>
                        <p:password value="#{usuarioBean.nuevo.contrasena}"
                                    required="true" styleClass="form-control"/>

                        <p:outputLabel value="Rol" styleClass="form-label"/>
                        <h:outputText value="Administrador"
                                      styleClass="d-block form-control border-0 bg-light rounded px-3 py-2"/>

                        <p:outputLabel value="Estado" styleClass="form-label"/>
                        <p:selectOneMenu value="#{usuarioBean.nuevo.estado}"
                                         styleClass="w-100" required="true"
                                         requiredMessage="Seleccione el estado de la cuenta">
                            <f:selectItem itemLabel="Activo" itemValue="Activo"/>
                            <f:selectItem itemLabel="Inactivo" itemValue="Inactivo"/>
                        </p:selectOneMenu>
                    </p:panelGrid>

                    <!-- ✅ CORREGIDO: referencias correctas a usuarioBean -->
                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                            <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                             onclick="PF('dlgNuevoUsuario').hide(); return false;"
                                             styleClass="btn btn-outline-secondary"/>
                            <p:commandButton value="Guardar" icon="pi pi-check"
                                             action="#{usuarioBean.guardar}"
                                             update=":formTabla :growl formDlgNuevo"
                                             oncomplete="if(!args.validationFailed) PF('dlgNuevoUsuario').hide()"
                                             styleClass="btn btn-primary"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>

            <!-- Dialog Editar Usuario -->
            <h:form id="formDlgEdit">
                <p:dialog header="Editar usuario" widgetVar="dlgEditUsuario"
                          modal="true" resizable="false" draggable="false"
                          closable="true" closeOnEscape="true"
                          responsive="true" blockScroll="true"
                          styleClass="rounded-3 shadow taller-dialog-md">

                    <p:outputPanel id="panelEditUsuario"
                                   rendered="#{usuarioBean.seleccionado != null}">
                        <p:panelGrid columns="2" styleClass="ui-fluid taller-dialog-grid">
                            <p:outputLabel value="Nombre" styleClass="form-label"/>
                            <p:inputText value="#{usuarioBean.seleccionado.nombre}"
                                         required="true" styleClass="form-control"/>

                            <p:outputLabel value="Correo" styleClass="form-label"/>
                            <p:inputText value="#{usuarioBean.seleccionado.correo}"
                                         required="true" styleClass="form-control"
                                         placeholder="nombre@correo.com">
                                <f:validateRegex pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$"/>
                            </p:inputText>

                            <p:outputLabel value="Contraseña" styleClass="form-label"/>
                            <p:password value="#{usuarioBean.seleccionado.contrasena}"
                                        redisplay="true" required="false"
                                        styleClass="form-control"
                                        placeholder="Deje vacío para no cambiar"/>

                            <!-- <p:outputLabel value="Rol" styleClass="form-label"/>
                            <p:selectOneMenu value="#{usuarioBean.seleccionado.rol}" styleClass="w-100">
                                <p:ajax event="change" process="@this"
                                        update="formDlgEdit:panelEditUsuario"/>
                                <f:selectItem itemLabel="admin" itemValue="admin"/>
                                <f:selectItem itemLabel="tecnico" itemValue="tecnico"/>
                            </p:selectOneMenu>-->


                            <p:outputLabel value="Estado" styleClass="form-label"/>
                            <p:selectOneMenu value="#{usuarioBean.seleccionado.estado}"
                                             styleClass="w-100" required="true"
                                             requiredMessage="Seleccione el estado">
                                <f:selectItem itemLabel="Activo" itemValue="Activo"/>
                                <f:selectItem itemLabel="Inactivo" itemValue="Inactivo"/>
                            </p:selectOneMenu>
                        </p:panelGrid>
                    </p:outputPanel>

                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                            <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                             onclick="PF('dlgEditUsuario').hide(); return false;"
                                             styleClass="btn btn-outline-secondary"/>
                            <p:commandButton value="Actualizar" icon="pi pi-check"
                                             action="#{usuarioBean.actualizar}"
                                             update=":formTabla :growl :formDlgEdit"
                                             oncomplete="if(!args.validationFailed) PF('dlgEditUsuario').hide()"
                                             styleClass="btn btn-primary"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>

        </h:panelGroup>

        <!-- Sin permisos -->
        <h:panelGroup layout="block"
                      styleClass="alert alert-warning border-0 shadow-sm"
                      rendered="#{not loginBean.admin}">
            <i class="bi bi-shield-exclamation me-2"></i>No tiene permisos para administrar usuarios.
        </h:panelGroup>

    </ui:define>
</ui:composition>
