<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/template.xhtml">

    <ui:define name="title">Repuestos</ui:define>

    <ui:define name="content">
        <f:metadata>
            <f:viewAction action="#{loginBean.exigirAdmin}"/>
        </f:metadata>
        <h:panelGroup rendered="#{loginBean.admin}">
            <h:form id="formToolbarRepuesto" prependId="false">
                <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                    <div>
                        <h2 class="h3 fw-bold text-primary mb-1">Repuestos</h2>
                        <p class="text-muted small mb-0">Catálogo, precios y stock</p>
                    </div>
                    <p:commandButton value="Nuevo repuesto" icon="pi pi-plus" actionListener="#{repuestoBean.prepararNuevo}"
                                     update=":formDlgNuevoRep" oncomplete="PF('dlgNuevoRep').show()"
                                     styleClass="btn btn-primary rounded-3 shadow-sm"/>
                </div>
            </h:form>

            <h:form id="formTablaRepuesto">
                <div class="card border-0 shadow-sm">
                    <div class="table-responsive rounded-3">
                        <p:dataTable value="#{repuestoBean.lista}" var="r" paginator="true" rows="10" reflow="true"
                                     emptyMessage="Sin repuestos" tableStyleClass="table table-hover align-middle mb-0">
                            <p:column headerText="ID" width="70"><h:outputText value="#{r.idRepuesto}"/></p:column>
                            <p:column headerText="Nombre"><h:outputText value="#{r.nombre}"/></p:column>
                            <p:column headerText="Precio"><h:outputText value="#{r.precio}"/></p:column>
                            <p:column headerText="Stock"><h:outputText value="#{r.stock}"/></p:column>
                            <p:column headerText="Acciones" width="180">
                                <div class="btn-group btn-group-sm">
                                    <p:commandButton icon="pi pi-pencil" process="@this" update=":formDlgEditRepuesto"
                                                     actionListener="#{repuestoBean.prepararEditar(r)}"
                                                     oncomplete="PF('dlgEditRepuesto').show()" styleClass="btn btn-outline-primary"/>
                                    <p:commandButton icon="pi pi-trash" process="@this" action="#{repuestoBean.eliminar(r)}"
                                                     update=":formTablaRepuesto :growl" styleClass="btn btn-outline-danger">
                                        <p:confirm header="Confirmar" message="¿Eliminar repuesto?"/>
                                    </p:commandButton>
                                </div>
                            </p:column>
                        </p:dataTable>
                    </div>
                </div>
                <p:confirmDialog global="true" styleClass="taller-pf-confirm rounded-3 shadow"/>
            </h:form>

            <h:form id="formDlgNuevoRep">
                <p:dialog header="Nuevo repuesto" widgetVar="dlgNuevoRep" modal="true" resizable="false" draggable="false"
                          closable="true" closeOnEscape="true" responsive="true" blockScroll="true"
                          styleClass="rounded-3 shadow taller-dialog-sm">
                    <p:panelGrid columns="2" rendered="#{repuestoBean.nuevo != null}" styleClass="ui-fluid taller-dialog-grid">
                        <p:outputLabel value="Nombre" styleClass="form-label"/>
                        <p:inputText value="#{repuestoBean.nuevo.nombre}" required="true" styleClass="form-control"/>
                        <p:outputLabel value="Precio" styleClass="form-label"/>
                        <p:inputNumber value="#{repuestoBean.nuevo.precio}" minValue="0" decimalPlaces="2"/>
                        <p:outputLabel value="Stock" styleClass="form-label"/>
                        <p:inputNumber value="#{repuestoBean.nuevo.stock}" minValue="0"/>
                    </p:panelGrid>
                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                            <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                             onclick="PF('dlgNuevoRep').hide(); return false;"
                                             styleClass="btn btn-outline-secondary"/>
                            <p:commandButton value="Guardar" action="#{repuestoBean.guardar}" update=":formTablaRepuesto :growl formDlgNuevoRep"
                                             oncomplete="if(!args.validationFailed) PF('dlgNuevoRep').hide()"
                                             styleClass="btn btn-primary" icon="pi pi-check"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>

            <h:form id="formDlgEditRepuesto">
                <p:dialog header="Editar repuesto" widgetVar="dlgEditRepuesto" modal="true" resizable="false" draggable="false"
                          closable="true" closeOnEscape="true" responsive="true" blockScroll="true"
                          styleClass="rounded-3 shadow taller-dialog-sm">
                    <p:panelGrid columns="2" rendered="#{repuestoBean.seleccionado != null}" styleClass="ui-fluid taller-dialog-grid">
                        <p:outputLabel value="Nombre" styleClass="form-label"/>
                        <p:inputText value="#{repuestoBean.seleccionado.nombre}" required="true" styleClass="form-control"/>
                        <p:outputLabel value="Precio" styleClass="form-label"/>
                        <p:inputNumber value="#{repuestoBean.seleccionado.precio}" minValue="0" decimalPlaces="2"/>
                        <p:outputLabel value="Stock" styleClass="form-label"/>
                        <p:inputNumber value="#{repuestoBean.seleccionado.stock}" minValue="0"/>
                    </p:panelGrid>
                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                            <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                             onclick="PF('dlgEditRepuesto').hide(); return false;"
                                             styleClass="btn btn-outline-secondary"/>
                            <p:commandButton value="Actualizar" action="#{repuestoBean.actualizar}" update=":formTablaRepuesto :growl formDlgEditRepuesto"
                                             oncomplete="if(!args.validationFailed) PF('dlgEditRepuesto').hide()"
                                             styleClass="btn btn-primary" icon="pi pi-check"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>
        </h:panelGroup>

        <h:panelGroup layout="block" styleClass="alert alert-warning border-0 shadow-sm" rendered="#{not loginBean.admin}">
            <i class="bi bi-shield-exclamation me-2"></i>No tiene permisos para administrar el catálogo de repuestos.
        </h:panelGroup>
    </ui:define>
</ui:composition>
