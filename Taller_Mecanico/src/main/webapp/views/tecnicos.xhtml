<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/template.xhtml">

    <ui:define name="title">Técnicos</ui:define>

    <ui:define name="content">
        <f:metadata>
            <f:viewAction action="#{loginBean.exigirAdmin}"/>
        </f:metadata>
        <h:panelGroup rendered="#{loginBean.admin}">
            <h:form id="formBarTec" prependId="false">
                <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                    <div>
                        <h2 class="h3 fw-bold text-primary mb-1">Técnicos</h2>
                        <p class="text-muted small mb-0">Personal de taller y especialidades</p>
                    </div>
                    <p:commandButton value="Nuevo técnico" icon="pi pi-plus" actionListener="#{tecnicoBean.prepararNuevo}"
                                     update=":formDlgNuevoTec" oncomplete="PF('dlgNuevoTec').show()"
                                     styleClass="btn btn-primary rounded-3 shadow-sm"/>
                </div>
            </h:form>

            <h:form id="formTablaTec">
                <div class="card border-0 shadow-sm">
                    <div class="table-responsive rounded-3">
                        <p:dataTable value="#{tecnicoBean.lista}" var="t" paginator="true" rows="10" reflow="true"
                                     emptyMessage="Sin registros" tableStyleClass="table table-hover align-middle mb-0">
                            <p:column headerText="ID" width="70"><h:outputText value="#{t.idTecnico}"/></p:column>
                            <p:column headerText="Nombre"><h:outputText value="#{t.nombre}"/></p:column>
                            <p:column headerText="Correo"><h:outputText value="#{t.correo}"/></p:column>
                            <p:column headerText="Especialidad"><h:outputText value="#{t.especialidad}"/></p:column>
                            <p:column headerText="Estado"><h:outputText value="#{t.estado}"/></p:column>
                            <p:column headerText="Acciones" width="180">
                                <div class="btn-group btn-group-sm">
                                    <p:commandButton icon="pi pi-pencil" process="@this" update=":formDlgEditTec"
                                                     actionListener="#{tecnicoBean.prepararEditar(t)}"
                                                     oncomplete="PF('dlgEditTec').show()" styleClass="btn btn-outline-primary"/>
                                    <p:commandButton icon="pi pi-trash" process="@this" action="#{tecnicoBean.eliminar(t)}"
                                                     update=":formTablaTec :growl" styleClass="btn btn-outline-danger">
                                        <p:confirm header="Confirmar" message="¿Eliminar técnico?"/>
                                    </p:commandButton>
                                </div>
                            </p:column>
                        </p:dataTable>
                    </div>
                </div>
                <p:confirmDialog global="true" styleClass="taller-pf-confirm rounded-3 shadow"/>
            </h:form>

            <h:form id="formDlgNuevoTec">
                <p:dialog header="Nuevo técnico" widgetVar="dlgNuevoTec" modal="true" resizable="false" draggable="false"
                          closable="true" closeOnEscape="true" responsive="true" blockScroll="true"
                          styleClass="rounded-3 shadow taller-dialog-md">
                    <p class="small text-muted mb-2">Se creará un usuario con rol técnico, mismo correo y contraseña inicial <strong>1234</strong> (cámbiela tras el primer acceso).</p>
                    <p:panelGrid columns="2" rendered="#{tecnicoBean.nuevo != null}" styleClass="ui-fluid taller-dialog-grid">
                        <p:outputLabel value="Nombre" styleClass="form-label"/>
                        <p:inputText value="#{tecnicoBean.nuevo.nombre}" required="true" styleClass="form-control"/>
                        <p:outputLabel value="Correo (login)" styleClass="form-label"/>
                        <p:inputText value="#{tecnicoBean.nuevo.correo}" required="true" styleClass="form-control"
                                     placeholder="tecnico@correo.com">
                            <f:validateRegex pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$"/>
                        </p:inputText>
                        <p:outputLabel value="Especialidad" styleClass="form-label"/>
                        <p:inputText value="#{tecnicoBean.nuevo.especialidad}" styleClass="form-control"/>
                        <p:outputLabel value="Estado" styleClass="form-label"/>
                        <p:selectOneMenu value="#{tecnicoBean.nuevo.estado}" styleClass="w-100" required="true">
                            <f:selectItems value="#{tecnicoBean.estadosRegistro}"/>
                        </p:selectOneMenu>
                    </p:panelGrid>
                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                            <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                             onclick="PF('dlgNuevoTec').hide(); return false;"
                                             styleClass="btn btn-outline-secondary"/>
                            <p:commandButton value="Guardar" action="#{tecnicoBean.guardar}" update=":formTablaTec :growl formDlgNuevoTec"
                                             oncomplete="if(!args.validationFailed) PF('dlgNuevoTec').hide()"
                                             styleClass="btn btn-primary" icon="pi pi-check"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>

            <h:form id="formDlgEditTec">
                <p:dialog header="Editar técnico" widgetVar="dlgEditTec" modal="true" resizable="false" draggable="false"
                          closable="true" closeOnEscape="true" responsive="true" blockScroll="true"
                          styleClass="rounded-3 shadow taller-dialog-md">
                    <p:panelGrid columns="2" rendered="#{tecnicoBean.seleccionado != null}" styleClass="ui-fluid taller-dialog-grid">
                        <p:outputLabel value="Nombre" styleClass="form-label"/>
                        <p:inputText value="#{tecnicoBean.seleccionado.nombre}" required="true" styleClass="form-control"/>
                        <p:outputLabel value="Correo (login)" styleClass="form-label"/>
                        <p:inputText value="#{tecnicoBean.seleccionado.correo}" required="true" styleClass="form-control"
                                     placeholder="tecnico@correo.com">
                            <f:validateRegex pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$"/>
                        </p:inputText>
                        <p:outputLabel value="Especialidad" styleClass="form-label"/>
                        <p:inputText value="#{tecnicoBean.seleccionado.especialidad}" styleClass="form-control"/>
                        <p:outputLabel value="Estado" styleClass="form-label"/>
                        <p:selectOneMenu value="#{tecnicoBean.seleccionado.estado}" styleClass="w-100" required="true">
                            <f:selectItems value="#{tecnicoBean.estadosRegistro}"/>
                        </p:selectOneMenu>
                    </p:panelGrid>
                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                            <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                             onclick="PF('dlgEditTec').hide(); return false;"
                                             styleClass="btn btn-outline-secondary"/>
                            <p:commandButton value="Actualizar" action="#{tecnicoBean.actualizar}" update=":formTablaTec :growl formDlgEditTec"
                                             oncomplete="if(!args.validationFailed) PF('dlgEditTec').hide()"
                                             styleClass="btn btn-primary" icon="pi pi-check"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>
        </h:panelGroup>

        <h:panelGroup layout="block" styleClass="alert alert-warning border-0 shadow-sm" rendered="#{not loginBean.admin}">
            <i class="bi bi-shield-exclamation me-2"></i>No tiene permisos para esta sección.
        </h:panelGroup>
    </ui:define>
</ui:composition>
