<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/template.xhtml">

    <ui:define name="title">Gestión de Técnicos</ui:define>

    <ui:define name="content">
        <f:metadata>
            <f:viewAction action="#{loginBean.exigirAdmin}"/>
        </f:metadata>

        <h:panelGroup rendered="#{loginBean.admin}">
            <h:form id="formBarTec">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="text-primary fw-bold">Personal Técnico</h2>
                    <p:commandButton value="Nuevo Técnico" icon="pi pi-plus"
                                     actionListener="#{tecnicoBean.prepararNuevo}"
                                     update=":formDlgNuevoTec" oncomplete="PF('dlgNuevoTec').show()"
                                     styleClass="btn btn-primary shadow-sm"/>
                </div>
            </h:form>

            <h:form id="formTablaTec">
                <p:dataTable value="#{tecnicoBean.getLista()}" var="t" paginator="true" rows="10"
                             styleClass="card border-0 shadow-sm rounded-3">
                    <p:column headerText="Nombre">#{t.nombre}</p:column>
                    <p:column headerText="Correo">#{t.correo}</p:column>
                    <p:column headerText="Especialidad">#{t.especialidad}</p:column>
                    <p:column headerText="Estado">
                        <span class="badge #{t.estado eq 'Activo' ? 'bg-success' : 'bg-secondary'}">#{t.estado}</span>
                    </p:column>
                    <p:column headerText="Acciones" width="120">
                        <p:commandButton icon="pi pi-pencil" actionListener="#{tecnicoBean.prepararEditar(t)}"
                                         update=":formDlgEditTec" oncomplete="PF('dlgEditTec').show()"
                                         styleClass="btn btn-sm btn-outline-primary me-2"/>
                    </p:column>
                </p:dataTable>
            </h:form>

            <!-- DIALOGO NUEVO TÉCNICO -->
            <h:form id="formDlgNuevoTec">
                <p:dialog header="Registrar Nuevo Técnico" widgetVar="dlgNuevoTec" modal="true" responsive="true">

                    <p:messages id="msgsNuevo" closable="true" showDetail="false" />

                    <p:panelGrid columns="2" rendered="#{tecnicoBean.nuevo != null}" styleClass="ui-fluid">
                        <p:outputLabel value="Nombre Completo:" for="nomN"/>
                        <p:inputText id="nomN" value="#{tecnicoBean.nuevo.nombre}"
                                     required="true"
                                     requiredMessage="El nombre es obligatorio"/>

                        <p:outputLabel value="Correo:" for="corN"/>
                        <p:inputText id="corN" value="#{tecnicoBean.nuevo.correo}"
                                     required="true"
                                     placeholder="ejemplo@gmail.com"
                                     requiredMessage="El correo es obligatorio"
                                     validatorMessage="Correo inválido">
                            <f:validateRegex pattern="^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$"/>
                            <p:ajax event="blur" update="msgsNuevo"/>
                        </p:inputText>

                        <p:outputLabel value="Especialidad:" for="espN"/>
                        <p:inputText id="espN" value="#{tecnicoBean.nuevo.especialidad}"/>

                        <p:outputLabel value="Estado:"/>
                        <p:selectOneMenu value="#{tecnicoBean.nuevo.estado}">
                            <f:selectItems value="#{tecnicoBean.estadosRegistro}"/>
                        </p:selectOneMenu>
                    </p:panelGrid>

                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2">
                            <p:commandButton value="Cancelar" type="button"
                                             onclick="PF('dlgNuevoTec').hide()"
                                             styleClass="btn btn-secondary"/>
                            <p:commandButton value="Guardar"
                                             action="#{tecnicoBean.guardar}"
                                             update="msgsNuevo :formTablaTec :growl"
                                             oncomplete="if(!args.validationFailed) PF('dlgNuevoTec').hide()"
                                             styleClass="btn btn-primary"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>

            <!-- DIALOGO EDITAR TÉCNICO -->
            <h:form id="formDlgEditTec">
                <p:dialog header="Modificar Técnico" widgetVar="dlgEditTec"
                          modal="true" responsive="true" closable="true">

                    <p:messages id="msgsEdit" closable="true" showDetail="false"/>

                    <p:panelGrid columns="2" rendered="#{tecnicoBean.seleccionado != null}" styleClass="ui-fluid">
                        <p:outputLabel value="Nombre:" for="nomE"/>
                        <p:inputText id="nomE" value="#{tecnicoBean.seleccionado.nombre}"
                                     required="true"
                                     requiredMessage="El nombre es obligatorio"/>

                        <p:outputLabel value="Correo:" for="corE"/>
                        <p:inputText id="corE" value="#{tecnicoBean.seleccionado.correo}"
                                     required="true"
                                     requiredMessage="El correo es obligatorio"
                                     validatorMessage="Correo inválido">
                            <f:validateRegex pattern="^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$"/>
                            <p:ajax event="blur" update="msgsEdit"/>
                        </p:inputText>

                        <p:outputLabel value="Estado:"/>
                        <p:selectOneMenu value="#{tecnicoBean.seleccionado.estado}">
                            <f:selectItems value="#{tecnicoBean.estadosRegistro}"/>
                        </p:selectOneMenu>
                    </p:panelGrid>

                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2">
                            <p:commandButton value="Cancelar" type="button"
                                             onclick="PF('dlgEditTec').hide()"
                                             styleClass="btn btn-secondary"/>
                            <p:commandButton value="Actualizar Datos"
                                             action="#{tecnicoBean.actualizar}"
                                             update="msgsEdit :formTablaTec :growl"
                                             oncomplete="if(!args.validationFailed &amp;&amp; !args.errorEncontrado) PF('dlgEditTec').hide()"
                                             styleClass="btn btn-primary"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>

        </h:panelGroup>
    </ui:define>
</ui:composition>
