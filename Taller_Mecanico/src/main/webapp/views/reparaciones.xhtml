<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/template.xhtml">

    <ui:define name="title">Reparaciones</ui:define>

    <ui:define name="content">
        <h:form id="formBarReparacion" prependId="false">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                <div>
                    <h2 class="h3 fw-bold text-primary mb-1">Reparaciones</h2>
                    <p class="text-muted small mb-0">Seguimiento por orden de trabajo</p>
                </div>
                <p:commandButton value="Nueva reparación" icon="pi pi-plus" actionListener="#{reparacionBean.prepararNuevo}"
                                 update=":formDlgNuevaRep" oncomplete="PF('dlgNuevaRep').show()"
                                 styleClass="btn btn-primary rounded-3 shadow-sm"/>
            </div>
        </h:form>

        <h:form id="formTablaRep">
            <div class="card border-0 shadow-sm">
                <div class="table-responsive rounded-3">
                    <p:dataTable value="#{reparacionBean.lista}" var="r" paginator="true" rows="10" reflow="true"
                                 emptyMessage="Sin reparaciones" tableStyleClass="table table-hover align-middle mb-0">
                        <p:column headerText="ID" width="70"><h:outputText value="#{r.idReparacion}"/></p:column>
                        <p:column headerText="Orden"><h:outputText value="#{r.idOrden}"/></p:column>
                        <p:column headerText="Descripción"><h:outputText value="#{r.descripcion}"/></p:column>
                        <p:column headerText="Estado">
                            <span class="#{ordenBean.claseBadgeEstado(r.estado)}"><h:outputText value="#{r.estado}"/></span>
                        </p:column>
                        <p:column headerText="Acciones" width="200">
                            <div class="btn-group btn-group-sm">
                                <p:commandButton icon="pi pi-pencil" process="@this" update=":formDlgEditRep"
                                                 actionListener="#{reparacionBean.prepararEditar(r)}"
                                                 oncomplete="PF('dlgEditRep').show()" styleClass="btn btn-outline-primary"/>
                                <p:commandButton icon="pi pi-trash" process="@this" action="#{reparacionBean.eliminar(r)}"
                                                 update=":formTablaRep :growl" styleClass="btn btn-outline-danger"
                                                 rendered="#{loginBean.admin}">
                                    <p:confirm header="Confirmar" message="¿Eliminar reparación?"/>
                                </p:commandButton>
                            </div>
                        </p:column>
                    </p:dataTable>
                </div>
            </div>
            <p:confirmDialog global="true" styleClass="taller-pf-confirm rounded-3 shadow"/>
        </h:form>

        <h:form id="formDlgNuevaRep">
            <p:dialog header="Nueva reparación" widgetVar="dlgNuevaRep" modal="true" resizable="false" draggable="false"
                      closable="true" closeOnEscape="true" responsive="true" blockScroll="true"
                      styleClass="rounded-3 shadow taller-dialog-lg">
                <p:panelGrid columns="2" rendered="#{reparacionBean.nuevo != null}" styleClass="ui-fluid taller-dialog-grid">
                    <p:outputLabel value="Orden" styleClass="form-label"/>
                    <p:selectOneMenu value="#{reparacionBean.nuevo.idOrden}" styleClass="w-100" required="true">
                        <f:selectItem itemLabel="Seleccione..." itemValue="#{null}"/>
                        <f:selectItems value="#{reparacionBean.ordenesDisponibles}" var="o"
                                       itemLabel="#{o.idOrden} — #{o.placaVehiculo}" itemValue="#{o.idOrden}"/>
                    </p:selectOneMenu>
                    <p:outputLabel value="Descripción" styleClass="form-label"/>
                    <p:inputTextarea value="#{reparacionBean.nuevo.descripcion}" rows="3" required="true" styleClass="form-control"/>
                    <p:outputLabel value="Estado" styleClass="form-label"/>
                    <p:selectOneMenu value="#{reparacionBean.nuevo.estado}" styleClass="w-100">
                        <f:selectItems value="#{reparacionBean.estados}"/>
                    </p:selectOneMenu>
                </p:panelGrid>
                <f:facet name="footer">
                    <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                        <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                         onclick="PF('dlgNuevaRep').hide(); return false;"
                                         styleClass="btn btn-outline-secondary"/>
                        <p:commandButton value="Guardar" action="#{reparacionBean.guardar}" update=":formTablaRep :growl formDlgNuevaRep"
                                         oncomplete="if(!args.validationFailed) PF('dlgNuevaRep').hide()"
                                         styleClass="btn btn-primary" icon="pi pi-check"/>
                    </div>
                </f:facet>
            </p:dialog>
        </h:form>

        <h:form id="formDlgEditRep">
            <p:dialog header="Editar reparación" widgetVar="dlgEditRep" modal="true" resizable="false" draggable="false"
                      closable="true" closeOnEscape="true" responsive="true" blockScroll="true"
                      styleClass="rounded-3 shadow taller-dialog-lg">
                <p:panelGrid columns="2" rendered="#{reparacionBean.seleccionado != null}" styleClass="ui-fluid taller-dialog-grid">
                    <p:outputLabel value="Orden" styleClass="form-label"/>
                    <p:selectOneMenu value="#{reparacionBean.seleccionado.idOrden}" styleClass="w-100" required="true">
                        <f:selectItem itemLabel="Seleccione..." itemValue="#{null}"/>
                        <f:selectItems value="#{reparacionBean.ordenesDisponibles}" var="o"
                                       itemLabel="#{o.idOrden} — #{o.placaVehiculo}" itemValue="#{o.idOrden}"/>
                    </p:selectOneMenu>
                    <p:outputLabel value="Descripción" styleClass="form-label"/>
                    <p:inputTextarea value="#{reparacionBean.seleccionado.descripcion}" rows="3" required="true" styleClass="form-control"/>
                    <p:outputLabel value="Estado" styleClass="form-label"/>
                    <p:selectOneMenu value="#{reparacionBean.seleccionado.estado}" styleClass="w-100">
                        <f:selectItems value="#{reparacionBean.estados}"/>
                    </p:selectOneMenu>
                </p:panelGrid>
                <f:facet name="footer">
                    <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                        <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                         onclick="PF('dlgEditRep').hide(); return false;"
                                         styleClass="btn btn-outline-secondary"/>
                        <p:commandButton value="Actualizar" action="#{reparacionBean.actualizar}" update=":formTablaRep :growl formDlgEditRep"
                                         oncomplete="if(!args.validationFailed) PF('dlgEditRep').hide()"
                                         styleClass="btn btn-primary" icon="pi pi-check"/>
                    </div>
                </f:facet>
            </p:dialog>
        </h:form>
    </ui:define>
</ui:composition>
