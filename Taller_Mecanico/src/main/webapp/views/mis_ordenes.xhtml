<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/template.xhtml">

    <ui:define name="title">Mis órdenes</ui:define>

    <ui:define name="content">
        <f:metadata>
            <f:viewAction action="#{misOrdenesBean.initPagina}"/>
        </f:metadata>
        <h:form id="formBarMis" prependId="false">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                <div>
                    <h2 class="h3 fw-bold text-primary mb-1">Mis órdenes asignadas</h2>
                    <p class="text-muted small mb-0">Solo las órdenes donde usted es el técnico asignado</p>
                </div>
            </div>
        </h:form>

        <h:form id="formFiltrosMis">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white py-3 border-0">
                    <span class="fw-semibold text-secondary"><i class="bi bi-funnel me-2"></i>Filtros</span>
                </div>
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <p:outputLabel value="Placa" styleClass="form-label small text-muted"/>
                            <p:inputText value="#{misOrdenesBean.filtroPlaca}" placeholder="Ej. HBU2574" styleClass="form-control"/>
                        </div>
                        <div class="col-md-3">
                            <p:outputLabel value="Estado" styleClass="form-label small text-muted"/>
                            <p:selectOneMenu value="#{misOrdenesBean.filtroEstado}" styleClass="w-100">
                                <f:selectItem itemLabel="Todos" itemValue="#{null}"/>
                                <f:selectItems value="#{misOrdenesBean.estadosOrden}"/>
                            </p:selectOneMenu>
                        </div>
                        <div class="col-md-3 d-flex gap-2">
                            <p:commandButton value="Buscar" icon="pi pi-search" action="#{misOrdenesBean.cargarLista}"
                                             update=":formTablaMis" process="@form"
                                             styleClass="btn btn-primary flex-grow-1"/>
                            <p:commandButton value="Limpiar" icon="pi pi-times" action="#{misOrdenesBean.limpiarFiltros}"
                                             update="formFiltrosMis :formTablaMis" styleClass="btn btn-outline-secondary"/>
                        </div>
                    </div>
                </div>
            </div>
        </h:form>

        <h:form id="formTablaMis">
            <div class="card border-0 shadow-sm">
                <div class="table-responsive rounded-3">
                    <p:dataTable value="#{misOrdenesBean.lista}" var="o" paginator="true" rows="10" reflow="true"
                                 emptyMessage="Sin órdenes asignadas"
                                 tableStyleClass="table table-hover align-middle mb-0">
                        <p:column headerText="ID" width="60"><h:outputText value="#{o.idOrden}"/></p:column>
                        <p:column headerText="Placa"><h:outputText value="#{o.placaVehiculo}"/></p:column>
                        <p:column headerText="Cliente"><h:outputText value="#{o.nombreCliente}"/></p:column>
                        <p:column headerText="Ingreso"><h:outputText value="#{o.fechaIngreso}"/></p:column>
                        <p:column headerText="Estado">
                            <span class="#{misOrdenesBean.claseBadgeEstado(o.estado)}"><h:outputText value="#{o.estado}"/></span>
                        </p:column>
                        <p:column headerText="Acciones" width="220">
                            <div class="btn-group btn-group-sm">
                                <p:commandButton icon="pi pi-pencil" title="Estado y descripción" process="@this"
                                                 update=":formDlgEditMiOrden"
                                                 actionListener="#{misOrdenesBean.prepararEditarOrden(o)}"
                                                 oncomplete="PF('dlgEditMiOrden').show()" styleClass="btn btn-outline-primary"/>
                                <p:commandButton icon="pi pi-tools" title="Reparaciones" process="@this"
                                                 update=":formDlgReparMis"
                                                 actionListener="#{misOrdenesBean.cargarReparaciones(o)}"
                                                 oncomplete="PF('dlgReparMis').show()" styleClass="btn btn-outline-secondary"/>
                            </div>
                        </p:column>
                    </p:dataTable>
                </div>
            </div>
        </h:form>

        <h:form id="formDlgEditMiOrden">
            <p:dialog header="Actualizar orden" widgetVar="dlgEditMiOrden" modal="true" resizable="false" draggable="false"
                      closable="true" closeOnEscape="true" responsive="true" blockScroll="true"
                      styleClass="rounded-3 shadow taller-dialog-md">
                <p:panelGrid columns="2" rendered="#{misOrdenesBean.ordenEdicion != null}" styleClass="ui-fluid taller-dialog-grid">
                    <p:outputLabel value="Estado" styleClass="form-label"/>
                    <p:selectOneMenu value="#{misOrdenesBean.ordenEdicion.estado}" styleClass="w-100" required="true">
                        <f:selectItems value="#{misOrdenesBean.estadosOrden}"/>
                    </p:selectOneMenu>
                    <p:outputLabel value="Descripción" styleClass="form-label"/>
                    <p:inputTextarea value="#{misOrdenesBean.ordenEdicion.descripcion}" rows="4" styleClass="form-control"/>
                </p:panelGrid>
                <f:facet name="footer">
                    <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                        <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                         onclick="PF('dlgEditMiOrden').hide(); return false;"
                                         styleClass="btn btn-outline-secondary"/>
                        <p:commandButton value="Guardar" action="#{misOrdenesBean.guardarOrdenTecnico}"
                                         update=":formTablaMis :growl formDlgEditMiOrden"
                                         oncomplete="if(!args.validationFailed) PF('dlgEditMiOrden').hide()"
                                         styleClass="btn btn-primary" icon="pi pi-check"/>
                    </div>
                </f:facet>
            </p:dialog>
        </h:form>

        <h:form id="formDlgReparMis">
            <p:dialog id="dlgReparMisW" header="Reparaciones de la orden"
                      widgetVar="dlgReparMis" modal="true" resizable="false" draggable="false"
                      closable="true" closeOnEscape="true" responsive="true" blockScroll="true"
                      styleClass="rounded-3 shadow taller-dialog-lg">
                <h:panelGroup layout="block" styleClass="small text-muted mb-2" rendered="#{misOrdenesBean.ordenReparaciones != null}">
                    Orden #<h:outputText value="#{misOrdenesBean.ordenReparaciones.idOrden}"/>
                </h:panelGroup>
                <p:dataTable value="#{misOrdenesBean.reparacionesOrden}" var="r" emptyMessage="Sin reparaciones"
                             reflow="true" styleClass="mb-3"
                             tableStyleClass="table table-sm table-striped align-middle mb-0">
                    <p:column headerText="Descripción"><h:outputText value="#{r.descripcion}"/></p:column>
                    <p:column headerText="Estado" width="140">
                        <span class="#{misOrdenesBean.claseBadgeEstado(r.estado)}"><h:outputText value="#{r.estado}"/></span>
                    </p:column>
                    <p:column headerText="" width="100">
                        <p:commandButton icon="pi pi-pencil" process="@this" update=":formDlgEditRepMis"
                                         actionListener="#{misOrdenesBean.prepararEditarReparacion(r)}"
                                         oncomplete="PF('dlgEditRepMis').show()" styleClass="btn btn-sm btn-outline-primary"/>
                    </p:column>
                </p:dataTable>
                <f:facet name="footer">
                    <div class="d-flex justify-content-end w-100">
                        <p:commandButton type="button" value="Cerrar" icon="pi pi-times"
                                         onclick="PF('dlgReparMis').hide(); return false;"
                                         styleClass="btn btn-secondary"/>
                    </div>
                </f:facet>
            </p:dialog>
        </h:form>

        <h:form id="formDlgEditRepMis">
            <p:dialog header="Editar reparación" widgetVar="dlgEditRepMis" modal="true" resizable="false" draggable="false"
                      closable="true" closeOnEscape="true" responsive="true" blockScroll="true"
                      styleClass="rounded-3 shadow taller-dialog-sm">
                <p:panelGrid columns="2" rendered="#{misOrdenesBean.reparacionEdicion != null}" styleClass="ui-fluid taller-dialog-grid">
                    <p:outputLabel value="Estado" styleClass="form-label"/>
                    <p:selectOneMenu value="#{misOrdenesBean.reparacionEdicion.estado}" styleClass="w-100" required="true">
                        <f:selectItems value="#{misOrdenesBean.estadosOrden}"/>
                    </p:selectOneMenu>
                    <p:outputLabel value="Descripción" styleClass="form-label"/>
                    <p:inputTextarea value="#{misOrdenesBean.reparacionEdicion.descripcion}" rows="4" required="true"
                                     styleClass="form-control"/>
                </p:panelGrid>
                <f:facet name="footer">
                    <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                        <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                         onclick="PF('dlgEditRepMis').hide(); return false;"
                                         styleClass="btn btn-outline-secondary"/>
                        <p:commandButton value="Guardar" action="#{misOrdenesBean.guardarReparacionTecnico}"
                                         update=":formDlgReparMis :formTablaMis :growl formDlgEditRepMis"
                                         oncomplete="if(!args.validationFailed) PF('dlgEditRepMis').hide()"
                                         styleClass="btn btn-primary" icon="pi pi-check"/>
                    </div>
                </f:facet>
            </p:dialog>
        </h:form>
    </ui:define>
</ui:composition>
