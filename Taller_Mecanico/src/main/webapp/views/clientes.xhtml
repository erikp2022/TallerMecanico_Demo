<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/template.xhtml">

    <ui:define name="title">Clientes</ui:define>

    <ui:define name="content">
        <f:metadata>
            <f:viewAction action="#{loginBean.exigirAdmin}"/>
        </f:metadata>
        <h:panelGroup rendered="#{loginBean.admin}">
            <h:form id="formBarCli" prependId="false">
                <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                    <div>
                        <h2 class="h3 fw-bold text-primary mb-1">Clientes</h2>
                        <p class="text-muted small mb-0">Datos de contacto y dirección</p>
                    </div>
                    <p:commandButton value="Nuevo cliente" icon="pi pi-plus" actionListener="#{clienteBean.prepararNuevo}"
                                     update=":formDlgNuevoCli" oncomplete="PF('dlgNuevoCli').show()"
                                     styleClass="btn btn-primary rounded-3 shadow-sm"/>
                </div>
            </h:form>

            <h:form id="formTablaCli">
                <div class="card border-0 shadow-sm">
                    <div class="table-responsive rounded-3">
                        <p:dataTable value="#{clienteBean.lista}" var="c" paginator="true" rows="10" reflow="true"
                                     emptyMessage="Sin registros" tableStyleClass="table table-hover align-middle mb-0">
                            <p:column headerText="ID" width="70"><h:outputText value="#{c.idCliente}"/></p:column>
                            <p:column headerText="Nombre"><h:outputText value="#{c.nombre}"/></p:column>
                            <p:column headerText="Teléfono"><h:outputText value="#{c.telefono}"/></p:column>
                            <p:column headerText="Dirección"><h:outputText value="#{c.direccion}"/></p:column>
                            <p:column headerText="Acciones" width="180">
                                <div class="btn-group btn-group-sm">
                                    <p:commandButton icon="pi pi-pencil" process="@this" update=":formDlgEditCli"
                                                     actionListener="#{clienteBean.prepararEditar(c)}"
                                                     oncomplete="PF('dlgEditCli').show()" styleClass="btn btn-outline-primary"/>
                                    <p:commandButton icon="pi pi-trash" process="@this" action="#{clienteBean.eliminar(c)}"
                                                     update=":formTablaCli :growl" styleClass="btn btn-outline-danger">
                                        <p:confirm header="Confirmar" message="¿Eliminar cliente?"/>
                                    </p:commandButton>
                                </div>
                            </p:column>
                        </p:dataTable>
                    </div>
                </div>
                <p:confirmDialog global="true" styleClass="taller-pf-confirm rounded-3 shadow"/>
            </h:form>

            <h:form id="formDlgNuevoCli">
                <p:dialog header="Nuevo cliente" widgetVar="dlgNuevoCli" modal="true" resizable="false" draggable="false"
                          closable="true" closeOnEscape="true" responsive="true" blockScroll="true"
                          styleClass="rounded-3 shadow taller-dialog-md">
                    <p:panelGrid columns="2" rendered="#{clienteBean.nuevo != null}" styleClass="ui-fluid taller-dialog-grid">
                        <p:outputLabel value="Nombre" styleClass="form-label"/>
                        <p:inputText value="#{clienteBean.nuevo.nombre}" required="true" styleClass="form-control"/>
                        <p:outputLabel value="Teléfono" styleClass="form-label"/>
                        <p:inputText value="#{clienteBean.nuevo.telefono}" styleClass="form-control"/>
                        <p:outputLabel value="Dirección" styleClass="form-label"/>
                        <p:inputText value="#{clienteBean.nuevo.direccion}" styleClass="form-control"/>
                    </p:panelGrid>
                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                            <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                             onclick="PF('dlgNuevoCli').hide(); return false;"
                                             styleClass="btn btn-outline-secondary"/>
                            <p:commandButton value="Guardar" action="#{clienteBean.guardar}" update=":formTablaCli :growl formDlgNuevoCli"
                                             oncomplete="if(!args.validationFailed) PF('dlgNuevoCli').hide()"
                                             styleClass="btn btn-primary" icon="pi pi-check"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>

            <h:form id="formDlgEditCli">
                <p:dialog header="Editar cliente" widgetVar="dlgEditCli" modal="true" resizable="false" draggable="false"
                          closable="true" closeOnEscape="true" responsive="true" blockScroll="true"
                          styleClass="rounded-3 shadow taller-dialog-md">
                    <p:panelGrid columns="2" rendered="#{clienteBean.seleccionado != null}" styleClass="ui-fluid taller-dialog-grid">
                        <p:outputLabel value="Nombre" styleClass="form-label"/>
                        <p:inputText value="#{clienteBean.seleccionado.nombre}" required="true" styleClass="form-control"/>
                        <p:outputLabel value="Teléfono" styleClass="form-label"/>
                        <p:inputText value="#{clienteBean.seleccionado.telefono}" styleClass="form-control"/>
                        <p:outputLabel value="Dirección" styleClass="form-label"/>
                        <p:inputText value="#{clienteBean.seleccionado.direccion}" styleClass="form-control"/>
                    </p:panelGrid>
                    <f:facet name="footer">
                        <div class="d-flex justify-content-end gap-2 flex-wrap w-100">
                            <p:commandButton type="button" value="Cancelar" icon="pi pi-times"
                                             onclick="PF('dlgEditCli').hide(); return false;"
                                             styleClass="btn btn-outline-secondary"/>
                            <p:commandButton value="Actualizar" action="#{clienteBean.actualizar}" update=":formTablaCli :growl formDlgEditCli"
                                             oncomplete="if(!args.validationFailed) PF('dlgEditCli').hide()"
                                             styleClass="btn btn-primary" icon="pi pi-check"/>
                        </div>
                    </f:facet>
                </p:dialog>
            </h:form>
        </h:panelGroup>

        <h:panelGroup layout="block" styleClass="alert alert-warning border-0 shadow-sm" rendered="#{not loginBean.admin}">
            <i class="bi bi-shield-exclamation me-2"></i>No tiene permisos para esta sección.
        </h:panelGroup>
    </ui:define>
</ui:composition>
