<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
<f:view contentType="text/html" encoding="UTF-8">
    <f:metadata>
        <f:viewAction action="#{loginBean.verificarSesion}"/>
    </f:metadata>
    <h:head>
        <title><ui:insert name="title">Taller Mecánico</ui:insert></title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <!-- Bootstrap 5.3 -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
        <h:outputStylesheet library="css" name="estilos.css"/>
    </h:head>
    <h:body styleClass="taller-body bg-light">
        <!-- Growl dentro de formulario (requisito PrimeFaces) -->
        <h:form id="formGrowl" prependId="false">
            <p:growl id="growl" showDetail="true" life="4500" styleClass="shadow-sm"/>
        </h:form>

        <div class="container-fluid g-0">
            <div class="row g-0 min-vh-100">
                <aside class="col-12 col-md-4 col-lg-3 col-xl-2 taller-sidebar d-flex flex-column border-end border-secondary border-opacity-25">
                    <div class="brand px-3 pt-4 pb-3">
                        <div class="d-flex align-items-center gap-2 text-white mb-2">
                            <span class="rounded-3 bg-white bg-opacity-10 p-2 d-inline-flex">
                                <i class="bi bi-wrench-adjustable fs-4"></i>
                            </span>
                            <div>
                                <h1 class="h6 mb-0 fw-bold text-white">Taller Mecánico</h1>
                                <small class="text-white-50">Órdenes de trabajo</small>
                            </div>
                        </div>
                        <h:panelGroup layout="block" styleClass="user-pill small" rendered="#{loginBean.logueado}">
                            <i class="bi bi-person-circle me-1"></i>
                            <h:outputText value="#{loginBean.usuario.nombre}"/>
                            <span class="text-white-50"> · </span>
                            <span class="badge text-bg-light text-dark"><h:outputText value="#{loginBean.usuario.rol}"/></span>
                        </h:panelGroup>
                    </div>
                    <nav class="flex-grow-1 px-2 pb-3">
                        <ui:include src="/menu.xhtml"/>
                    </nav>
                </aside>
                <main class="col-12 col-md-8 col-lg-9 col-xl-10 taller-main">
                    <div class="px-3 px-md-4 py-4">
                        <ui:insert name="content"/>
                    </div>
                </main>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
                crossorigin="anonymous"/>
    </h:body>
</f:view>
</html>
